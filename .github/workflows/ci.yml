name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      sync_public:
        description: "Sync to public repo"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard public tree (no tracked local-only Cursor paths)
        run: |
          set -euo pipefail
          bad="$(git ls-files | grep -E '^\.cursor/HANDOFF\.md$|\.cursor/plans/.+\.plan\.md$' || true)"
          if [ -n "$bad" ]; then
            echo "::error::These paths must not be tracked:"
            echo "$bad"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # ── Sync to public mirror (tag or manual trigger) ──
  # Secret PUBLIC_REPO_TOKEN: fine-grained token with public repo Contents,
  # Pull requests, and merge (or auto-merge) permission. Repo must Allow auto-merge
  # when required checks exist. Opt out: PUBLIC_SYNC_AUTO_MERGE=false.
  # The secrets context is not allowed in job-level `if`; the guard step
  # below skips gracefully when the secret is unset, so tags v* do not fail.
  sync-public:
    needs: build
    if: >-
      startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch'
          && github.event.inputs.sync_public == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run sync
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PUBLIC_REPO_TOKEN not configured — skipping public sync."
            exit 0
          fi
          gh auth setup-git
          node scripts/sync-public.mjs
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          PUBLIC_REPO_URL: ${{ vars.PUBLIC_REPO_URL || 'https://github.com/agent-kit-startup/agent-kit.git' }}
          PUBLIC_REPO_SLUG: agent-kit-startup/agent-kit
          PUBLIC_BRANCH: main
          # Default: auto-merge after create/update. Set repo/org var to "false" to opt out.
          PUBLIC_SYNC_AUTO_MERGE: ${{ vars.PUBLIC_SYNC_AUTO_MERGE || 'true' }}
          GIT_AUTHOR_NAME: agent-kit-sync
          GIT_AUTHOR_EMAIL: sync@agent-kit.dev

  # ── Publish @dadado/agent-kit-cli to npm (tag only) ──
  # Secret NPM_TOKEN: the publish step skips gracefully if not configured
  # (secrets context is not allowed in job-level `if`).
  publish-npm:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install & Build
        run: pnpm install --frozen-lockfile=false && pnpm build

      - name: Publish
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not configured — skipping npm publish."
            exit 0
          fi
          pnpm --filter @dadado/agent-kit-cli publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
